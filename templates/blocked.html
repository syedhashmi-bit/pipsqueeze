<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PipSqueeze — Access Denied</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#030508;--red:#ff4060;--cyan:#00c8ff;--muted:#3d6070;--mono:'Share Tech Mono',monospace;--display:'Rajdhani',sans-serif;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:var(--display);background:var(--bg);color:#c8e0ee;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
        .bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;}
        .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,64,96,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,64,96,0.03) 1px,transparent 1px);background-size:44px 44px;}
        .scanlines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.15) 3px,rgba(0,0,0,0.15) 4px);}
        .gs{position:absolute;border-radius:50%;filter:blur(140px);}
        .gs1{width:600px;height:600px;background:#2a0010;top:-200px;left:-150px;opacity:.6;}
        .gs2{width:400px;height:400px;background:#1a000a;bottom:-100px;right:-100px;opacity:.4;}
        .card{position:relative;z-index:1;background:rgba(6,14,24,0.94);border:1px solid rgba(255,64,96,0.2);border-radius:6px;padding:48px 44px;max-width:480px;width:100%;text-align:center;box-shadow:0 0 0 1px rgba(255,64,96,0.06),0 50px 100px rgba(0,0,0,0.7);}
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--red),transparent);opacity:.6;}
        .icon{font-size:52px;margin-bottom:18px;filter:drop-shadow(0 0 16px rgba(255,64,96,0.5));}
        .sys-id{font-family:var(--mono);font-size:11px;letter-spacing:.22em;color:var(--red);opacity:.7;margin-bottom:14px;}
        h1{font-size:28px;font-weight:700;letter-spacing:.06em;color:#fff;margin-bottom:10px;text-shadow:0 0 30px rgba(255,64,96,0.3);}
        .msg{font-family:var(--mono);font-size:13px;color:#6a8ea0;line-height:1.7;margin-bottom:22px;}
        .ip-box{font-family:var(--mono);font-size:13px;padding:11px 16px;background:rgba(255,64,96,0.07);border:1px solid rgba(255,64,96,0.2);border-radius:3px;color:var(--red);margin-bottom:24px;letter-spacing:.05em;}
        .hint{font-family:var(--mono);font-size:11.5px;color:var(--muted);line-height:1.7;}
        .hint code{background:rgba(0,200,255,0.1);color:var(--cyan);padding:1px 6px;border-radius:2px;}
    </style>
</head>
<body>
<div class="bg-layer"><div class="grid"></div><div class="scanlines"></div><div class="gs gs1"></div><div class="gs gs2"></div></div>
<div class="card">
    <div class="icon">🚫</div>
    <div class="sys-id">PIPSQUEEZE</div>
    <h1>ACCESS DENIED</h1>
    <p class="msg">{{ reason }}</p>
    <div class="ip-box">Your IP: {{ ip }}</div>
    <p class="hint">
        To allow your IP, add it to <code>IP_WHITELIST</code> in your <code>.env</code> file:<br><br>
        <code>IP_WHITELIST={{ ip }}</code><br><br>
        For multiple IPs, separate with commas. Leave blank to allow all IPs.
    </p>
</div>
</body>
</html>
